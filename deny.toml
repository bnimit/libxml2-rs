# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Only check dependencies for the default feature set
all-features = false

[advisories]
version = 2
# Per-type action keys (vulnerability, unsound, unmaintained, yanked)
# were removed in cargo-deny v2. Secure defaults apply automatically:
# known vulnerabilities are denied, yanked crates are denied.
ignore = []

[licenses]
version = 2
# Licenses we explicitly allow
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    # cbindgen (build-only dep) is MPL-2.0; does not affect output binary license
    "MPL-2.0",
    # encoding_rs is (Apache-2.0 OR MIT) AND BSD-3-Clause
    "BSD-3-Clause",
]

[bans]
# Deny multiple versions of the same crate where possible
multiple-versions = "warn"
deny = []

[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
